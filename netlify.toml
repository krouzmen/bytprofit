[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/bytprofit-site run build"
  publish = "artifacts/bytprofit-site/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
